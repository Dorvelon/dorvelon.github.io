<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dorvelon — Horizontal logo lockup, WATERMARK on-dark variant (50%
  opacity, white DN on navy/dark backgrounds).

  Why this file exists: see `dorvelon-logo-horizontal-watermark.svg`
  for the react-pdf SVG-opacity-leak rationale (0.30.4). This file is
  the on-dark mirror of that, used on any dark-tone surface where the
  body-page watermark needs to render in white ink at 50% opacity.

  Geometry-identical mirror of `dorvelon-logo-horizontal-on-dark.svg`
  except for the wrapping `<g opacity="0.5">`. Any edit to that file
  must mirror here.
-->
