<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dorvelon — Horizontal logo lockup, WATERMARK variant (50% opacity).

  Why this file exists (0.30.4):
    react-pdf's `renderSvg` (in `@react-pdf/render`) does NOT apply
    `node.style.opacity` when drawing SVG `<Image>` content — only inner
    SVG primitives (G, path, …) get `setOpacity` applied via their own
    `opacity` PROP. So a consumer passing `<Image style={{ opacity: 0.5 }}>`
    over an SVG src gets ignored opacity in the rendered PDF.

    The cascade defines `pageFrame.slot.logoLockup.bodyOpacity = 0.5` for
    paginated-PDF body pages (cover vs body; cover at full opacity, body
    at watermark). To actually enact that rule in the rendered PDF, this
    file wraps the canonical lockup content in `<g opacity="0.5">` —
    react-pdf's `drawNode` calls `setOpacity` on the G's `opacity` prop,
    which puts `ctx.opacity(0.5)` on the PDF graphics state for the
    duration of the G's render scope. All children paint at 50%.

  Lockstep with the canonical:
    Geometry (DN paths, gold pedestal, wordmark) is byte-equivalent with
    `dorvelon-logo-horizontal.svg` except for the wrapping `<g opacity="0.5">`.
    Any edit to the canonical geometry must mirror here. The cascade-clean
    consumer pattern is to use `frameLogoLockup.assetPath` for cover and
    `frameLogoLockup.assetPathWatermark` for body — both come from the
    same recipe slot so they cannot diverge in size/position.

  See `0_brand/conversion-rules.md §6.5.12` for the formal rule and the
  react-pdf SVG-opacity-leak rationale.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="15 31 323 55"
  width="323"
  height="55"
  role="img"
  aria-label="Dorvelon"
>
  <!-- Single wrapping <g opacity="0.5"> — the watermark contract. -->
  <g opacity="0.5">
    <!-- Monogram (path-outlined DN, 0.30.0) — left half. -->
    <g transform="matrix(0.42727 0 0 0.42553 9.4 5.106)">
      <!-- DN letterforms — outlined paths (geometry-identical mirror). -->
      <path transform="matrix(0.19 0 0 -0.13 10 152)" fill="#0E2240" d="M17 700L17 692L93 692L93 8L29 8L29 0L224 0C405 1 495 176 495 351C495 526 404 700 222 700ZM180 692L218 692C342 692 403 521 403 350C403 179 341 8 218 8L180 8Z" />
      <path transform="matrix(0.19 0 0 -0.13 53 188)" fill="#0E2240" d="M150 8L87 8L87 609L415 1L415 0L423 0L423 692L487 692L487 700L350 700L350 692L415 692L415 176L133 700L14 700L14 692L78 692L78 8L14 8L14 0L150 0Z" />
      <!-- Gold pedestal — twin vertical stems + serif foot. -->
      <rect x="67" y="98" width="1" height="89" fill="#8C6D3F" />
      <rect x="69" y="109" width="1" height="79" fill="#8C6D3F" />
      <rect x="55" y="187" width="27" height="1" fill="#8C6D3F" />
    </g>
    <!-- Wordmark (Cormorant Garamond Light). -->
    <text
      x="122"
      y="57"
      font-family="Cormorant Garamond"
      font-size="30"
      letter-spacing="6.6"
      fill="#0E2240"
      dominant-baseline="central"
    >DORVELON</text>
  </g>
</svg>
