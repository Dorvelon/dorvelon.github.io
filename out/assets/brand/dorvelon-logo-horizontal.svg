<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dorvelon — Horizontal logo lockup (standalone)
  Monogram (Cormorant Garamond) + Wordmark "DORVELON" (Inter Regular)
  Colors: navy #0E2240, gold #8C6D3F (system primary, consolidated 0.11.0)
  Generated from components/brand/{Monogram,Wordmark,LogoHorizontal}.tsx
  Use for: email signatures, social cards, business-card prints, decks
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 100"
  width="420"
  height="100"
  role="img"
  aria-label="Dorvelon"
>
  <!-- Monogram (Cormorant) — left half. Scale: internal 220×235 → 94×100 px -->
  <svg x="0" y="0" width="94" height="100" viewBox="-22 -12 220 235" overflow="visible">
    <!-- Architectural construction marks — gold dashed lines @ 65% opacity -->
    <g stroke="#8C6D3F" stroke-width="1" stroke-dasharray="25 4 4 4" opacity="0.65">
      <line x1="8"   y1="55"  x2="100" y2="55"  />
      <line x1="1"   y1="113" x2="163" y2="113" />
      <line x1="24"  y1="185" x2="90"  y2="185" />
      <line x1="36"  y1="30"  x2="36"  y2="210" />
      <line x1="57"  y1="48"  x2="57"  y2="153" />
      <line x1="144" y1="78"  x2="144" y2="165" />
    </g>
    <!-- D — Cormorant Garamond Light -->
    <text x="16" y="152" font-family="'Cormorant Garamond', Georgia, serif" font-size="130" font-weight="300" fill="#0E2240">D</text>
    <!-- N — overlapping, lower z -->
    <text x="52" y="195" font-family="'Cormorant Garamond', Georgia, serif" font-size="130" font-weight="300" fill="#0E2240">N</text>
    <!-- Gold pedestal — twin vertical stems + serif foot at DN intersection -->
    <rect x="64" y="117" width="3.5" height="79" fill="#8C6D3F" />
    <rect x="70" y="123" width="3.5" height="73" fill="#8C6D3F" />
    <rect x="57" y="192" width="24"  height="4"  fill="#8C6D3F" />
  </svg>

  <!-- Wordmark (Inter Regular) — right of monogram, vertically centered -->
  <text
    x="122"
    y="50"
    font-family="'Inter', Arial, sans-serif"
    font-size="30"
    font-weight="400"
    letter-spacing="10.5"
    fill="#0E2240"
    dominant-baseline="central"
  >DORVELON</text>
</svg>
